<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wiom — Customer Closure · Cases</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Noto Sans',sans-serif;background:#1c1f26;color:#e7e9ee;display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .bar{flex:0 0 auto;background:#15171d;border-bottom:1px solid #2f333c;padding:0 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .bar .brand{font-size:13px;font-weight:800;letter-spacing:.02em;color:#fff;padding:13px 0;white-space:nowrap}
  .bar .brand span{color:#D9008D}
  .tabs{display:flex;gap:4px;overflow-x:auto}
  .tab{font-size:13px;font-weight:600;color:#9aa0ab;background:transparent;border:none;padding:15px 15px;cursor:pointer;border-bottom:3px solid transparent;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .tab .n{font-size:10px;font-weight:800;background:#2f333c;color:#c3c8d1;border-radius:50%;width:19px;height:19px;display:flex;align-items:center;justify-content:center}
  .tab .material-icons{font-size:18px}
  .tab:hover{color:#e7e9ee}
  .tab.active{color:#fff;border-bottom-color:#D9008D}
  .tab.active .n{background:#D9008D;color:#fff}
  .tab.soon{color:#5a5f6b;cursor:default}.tab.soon:hover{color:#5a5f6b}
  .tab.soon .n{background:#262a32;color:#5a5f6b}
  .modewrap{margin-left:auto;display:flex;align-items:center;gap:9px}
  .seg{display:inline-flex;background:#262a32;border:1px solid #343a47;border-radius:999px;padding:3px}
  .seg button{font-family:'Noto Sans';font-size:11.5px;font-weight:700;color:#9aa0ab;background:transparent;border:none;border-radius:999px;padding:6px 14px;cursor:pointer;display:flex;align-items:center;gap:6px}
  .seg button .material-icons{font-size:15px}
  .seg button.active{background:#D9008D;color:#fff}
  .frames{flex:1;position:relative;background:#1c1f26}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#1c1f26}
</style>
</head>
<body>
  <div class="bar">
    <div class="brand">Wiom <span>Customer Closure</span></div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-case="1"><span class="n">1</span><span class="material-icons">hourglass_bottom</span>Non-Reaffirmation</button>
      <button class="tab" data-case="2"><span class="n">2</span><span class="material-icons">logout</span>Explicit Choice</button>
      <button class="tab" data-case="3"><span class="n">3</span><span class="material-icons">location_off</span>Service-Unavailability</button>
    </div>
    <div class="modewrap">
      <a href="closure-build-delta.html" style="font-family:'Noto Sans';font-size:11.5px;font-weight:700;color:#8fe3b0;background:#15301f;border:1px solid #244a30;border-radius:999px;padding:7px 13px;text-decoration:none;display:inline-flex;align-items:center;gap:6px"><span class="material-icons" style="font-size:15px">layers</span>Build delta · design</a>
      <a href="closure-build-delta-prototype.html" style="font-family:'Noto Sans';font-size:11.5px;font-weight:700;color:#ffb3dd;background:#2a1620;border:1px solid #5a2748;border-radius:999px;padding:7px 13px;text-decoration:none;display:inline-flex;align-items:center;gap:6px"><span class="material-icons" style="font-size:15px">touch_app</span>Build delta · prototype</a>
      <div class="seg" id="seg">
        <button class="active" data-mode="proto"><span class="material-icons">touch_app</span>Prototype</button>
        <button data-mode="design"><span class="material-icons">view_carousel</span>Design</button>
      </div>
    </div>
  </div>
  <div class="frames">
    <iframe id="frame" src="closure-nonreaffirmation-prototype.html" title="Closure case"></iframe>
  </div>
<script>
  const FILES={
    '1':{proto:'closure-nonreaffirmation-prototype.html',design:'closure-nonreaffirmation-flow.html'},
    '2':{proto:'closure-explicit-choice-prototype.html', design:'closure-explicit-choice-flow.html'},
    '3':{proto:'closure-service-unavailability-prototype.html', design:'closure-service-unavailability-flow.html'}
  };
  let curCase='1', curMode='proto';
  const frame=document.getElementById('frame');
  function load(){frame.src=FILES[curCase][curMode];}
  document.getElementById('tabs').addEventListener('click',e=>{
    const b=e.target.closest('.tab');if(!b||b.classList.contains('soon'))return;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    b.classList.add('active');curCase=b.dataset.case;load();
  });
  document.getElementById('seg').addEventListener('click',e=>{
    const b=e.target.closest('button');if(!b)return;
    document.querySelectorAll('.seg button').forEach(t=>t.classList.remove('active'));
    b.classList.add('active');curMode=b.dataset.mode;load();
  });
</script>
</body>
</html>
